services:
  - type: web
    name: mess-admission-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: mess-admission-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-netlify-site.netlify.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mess-admission-api.onrender.com,https://your-netlify-site.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: mess-admission-db
          property: connectionString

databases:
  - name: mess-admission-db
    plan: free
